<template>
    <lightning-card  variant="Narrow"  title="Update Record with Apex" icon-name="utility:user">
        <div class="slds-box slds-var-m-around_medium">
            <lightning-input label="Id"  value={accountId} onchange={handleIdChange}></lightning-input>
            <lightning-input label="Name" onchange={handleNameChange}></lightning-input>
            <lightning-input label="Industry" onchange={handleIndustryChange}></lightning-input>
            <lightning-button label="Update Account" variant="brand" onclick={handleUpdateAccount}></lightning-button>
        </div>
    </lightning-card>
</template>
