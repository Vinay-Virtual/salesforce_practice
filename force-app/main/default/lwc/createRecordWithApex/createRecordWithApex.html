<template>
    <lightning-card  variant="Narrow"  title="Create Record with Apex" icon-name="utility:user">
        <div class="slds-box slds-var-m-around_medium">
            <lightning-input label="Id" disabled value={accountId}></lightning-input>
            <lightning-input label="Name" onchange={handleNameChange}></lightning-input>
            <lightning-input label="Industry" onchange={handleIndustryChange}></lightning-input>
            <lightning-button label="Create Account" variant="brand" onclick={handleCreateAccount}></lightning-button>
        </div>
    </lightning-card>
</template>
